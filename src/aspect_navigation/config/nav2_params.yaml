# Nav2 parameters for the ASPECT rover (1:10 scale, 0.15 m × 0.10 m chassis)
#
# T-101 configuration:
#   - odom frame throughout (no SLAM/map server)
#   - NavFn (Dijkstra) global planner
#   - DWB local planner / controller_server
#
# Frame convention
#   odom           — EKF output frame (authoritative pose, no map)
#   base_footprint — robot base frame (matches URDF + diff-drive plugin)

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: odom
    robot_base_frame: base_footprint
    odom_topic: /odometry/filtered
    bt_loop_duration: 10
    default_server_timeout: 20
    # Simple BT: ComputePathToPose → FollowPath with 1 Hz replanning.
    # No recovery behaviors (Spin/BackUp/Wait) — avoids dependency on
    # behavior_server which we are not launching in T-101 odom-only mode.
    default_nav_to_pose_bt_xml: /opt/ros/jazzy/share/nav2_bt_navigator/behavior_trees/navigate_w_replanning_time.xml
    navigators: ['navigate_to_pose']
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    # plugin_lib_names intentionally omitted — in Jazzy the navigator plugins
    # (NavigateToPoseNavigator) auto-register all BT nodes they need;
    # listing them here too causes "ID already registered" crashes.

planner_server:
  ros__parameters:
    use_sim_time: true
    # NavFn (Dijkstra) — simple and dependency-free; sufficient for Phase 0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5
      use_astar: false        # Dijkstra; flip to true for A*
      allow_unknown: true

# ── Global costmap ──────────────────────────────────────────────────────────
# Phase 0: static layer only (no sensor data yet).
# Inflation radius = 0.12 m → slightly larger than rover half-width (0.05 m)
# to add a conservative safety margin on the flat ground plane.
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: odom
      robot_base_frame: base_footprint
      robot_radius: 0.10        # circumscribed radius (m) for a 0.15×0.10 chassis
      resolution: 0.05          # 5 cm/cell — appropriate for 1:10 scale rover
      track_unknown_space: true
      # rolling_window keeps the robot in-bounds when using odom frame with no
      # static map — without this, the costmap is anchored at origin and the
      # robot exits bounds as it drives away (error_code 203 / COMPUTE_PATH_ERROR)
      rolling_window: true
      width: 40             # metres — large enough for test waypoints at x≤15 m
      height: 40            # metres
      # static_layer omitted — no /map topic without SLAM (T-101 odom-only mode)
      plugins: ["inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.12
      always_send_full_costmap: true

# ── Local costmap ───────────────────────────────────────────────────────────
# Phase 0: rolling window around the robot, no obstacle sensors yet.
# Kept intentionally minimal — local planner added in T-101 (Phase 1).
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 3              # metres
      height: 3             # metres
      resolution: 0.05
      robot_radius: 0.10
      plugins: ["inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.12
      always_send_full_costmap: true

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: true
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 0.22
      max_vel_y: 0.0
      max_vel_theta: 0.5
      min_speed_xy: 0.0
      max_speed_xy: 0.22
      min_speed_theta: 0.0
      acc_lim_x: 0.5
      acc_lim_y: 0.0
      acc_lim_theta: 3.2
      decel_lim_x: -0.5
      decel_lim_y: 0.0
      decel_lim_theta: -3.2
      vx_samples: 20
      vy_samples: 5
      vtheta_samples: 20
      sim_time: 1.7
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.2
      xy_goal_tolerance: 0.25
      trans_stopped_velocity: 0.25
      short_circuit_trajectory_evaluation: true
      stateful: true
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign",
                "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 0.02
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: true
    autostart: true
    bond_timeout: 4.0
    attempt_reconnect_service_timeout: 0.100
    node_names:
      - controller_server
      - planner_server
      - bt_navigator
